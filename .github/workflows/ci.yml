name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify project foundation
        run: |
          set -euo pipefail
          test -f README.md
          test -f README.zh-CN.md
          test -f AGENTS.md
          test -f docs/product-foundation.md
          test -f docs/superpowers/specs/2026-06-13-packet-builder-design.md
          test -f ops/opt-overlay.md
          test -f ops/constraints/production.md
          test -f ops/constraints/main-entry.md
          test -f ops/skills/evolution.md
          grep -q "README.zh-CN.md" README.md
          grep -q "README.md" README.zh-CN.md
          grep -q "local packet builder" README.md
          grep -q "Packet Builder Design" README.zh-CN.md
          grep -q "agent-failure-packet build" README.md
          grep -q "agent-failure-packet.run.v1" docs/superpowers/specs/2026-06-13-packet-builder-design.md
          grep -q "Security Gate" docs/superpowers/specs/2026-06-13-packet-builder-design.md
          grep -q "Do not modify OPT" ops/opt-overlay.md
          grep -q "Work on feature branches only" ops/opt-overlay.md
          grep -q "not a demo" ops/constraints/production.md
          grep -q "Delete Or Weaken" ops/skills/evolution.md

      - name: Install package
        run: python3 -m pip install -e '.[dev]'

      - name: Run tests
        run: python3 -m pytest tests -q

      - name: Smoke CLI
        run: |
          agent-failure-packet --version
          agent-failure-packet init --profile issue --output /tmp/agent-failure-packet.yml
          agent-failure-packet validate --input tests/fixtures/runs/generic-failure-v1.json
          agent-failure-packet build --input tests/fixtures/runs/generic-failure-v1.json --format json --output /tmp/failure-packet.json
          agent-failure-packet build --input tests/fixtures/runs/codex-cli-failure-v1.json --profile issue --output /tmp/issue-packet.md
          python3 scripts/run-action.py --input tests/fixtures/runs/generic-failure-v1.json --profile issue --output /tmp/action-packet.md
          grep -q "agent-failure-packet.packet.v1" /tmp/failure-packet.json
          grep -q "Agent Failure Packet" /tmp/action-packet.md
